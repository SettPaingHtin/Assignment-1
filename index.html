<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>WebGL Paint Program</title>
    <style>
      body { font-family: sans-serif; }
      .control-row { margin-bottom: 10px; }

      .canvas-container {
        display: flex;
        align-items: flex-start;
        gap: 20px; 
        margin-bottom: 15px;
      }
      
      canvas { border: 1px solid black; }
      
      #referenceImage {
        width: 400px;
        height: 400px;
        border: 1px solid black;
        object-fit: contain;
      }
    </style>
  </head>

  <body onload="main()">
    <div class="canvas-container">
      <canvas id="webgl" width="400" height="400">
        Please use a browser that supports "canvas"
      </canvas>
      <img id="referenceImage" src="drawing.jpg" alt="Reference Drawing">
    </div>

    <div class="control-row">
      <button id="clearButton">Clear Canvas</button>
      <button id="pictureButton">Draw My Picture</button>
    </div>

    <div class="control-row">
      <strong>Drawing Mode:</strong>
      <button id="pointButton">Squares</button>
      <button id="triangleButton">Triangles</button>
      <button id="circleButton">Circles</button>
    </div>

    <div class="control-row">
      <strong>Shape Color:</strong><br>
      Red <input type="range" min="0" max="100" value="100" class="slider" id="redSlide">
      Green <input type="range" min="0" max="100" value="0" class="slider" id="greenSlide">
      Blue <input type="range" min="0" max="100" value="0" class="slider" id="blueSlide">
      Opacity <input type="range" min="0" max="100" value="100" class="slider" id="alphaSlide">
    </div>

    <div class="control-row">
      <strong>Shape Size:</strong>
      <input type="range" min="5" max="40" value="10" class="slider" id="sizeSlide">
      <strong>(Circles) Segment Count:</strong>
      <input type="range" min="3" max="30" value="10" class="slider" id="segmentSlide">
    </div>

    <script src="lib/webgl-utils.js"></script>
    <script src="lib/webgl-debug.js"></script>
    <script src="lib/cuon-utils.js"></script>

    <script src="src/Point.js"></script>
    <script src="src/Triangle.js"></script>
    <script src="src/Circle.js"></script>

    <script src="src/asg1.js"></script>
  </body>
</html>
